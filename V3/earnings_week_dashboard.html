<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Upcoming Week Earnings Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.74);
      --panel-2: rgba(30, 41, 59, 0.7);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #0ea5e9;
      --accent-2: #22c55e;
      --danger: #ef4444;
      --warn: #f59e0b;
      --line: rgba(148, 163, 184, 0.22);
      --chip: rgba(14, 165, 233, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Sora", "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 85% 10%, rgba(14, 165, 233, 0.2), transparent 35%),
        radial-gradient(circle at 12% 80%, rgba(34, 197, 94, 0.16), transparent 30%),
        linear-gradient(145deg, #020617 0%, #0b1227 42%, #0f172a 100%);
      min-height: 100vh;
      padding: 24px;
    }

    .app {
      max-width: 1320px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 80px rgba(2, 6, 23, 0.45);
      overflow: hidden;
    }

    .header {
      padding: 22px 24px 10px 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(160deg, rgba(14, 165, 233, 0.08), rgba(30, 41, 59, 0.22));
    }

    .header h1 {
      margin: 0;
      font-size: clamp(1.25rem, 2vw, 1.8rem);
      letter-spacing: 0.02em;
      color: #e0f2fe;
    }

    .header p {
      margin: 8px 0 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .controls {
      padding: 16px 24px 20px 24px;
      display: grid;
      grid-template-columns: 1.3fr auto auto auto;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.45);
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .control-label {
      color: var(--muted);
      font-size: 0.84rem;
      white-space: nowrap;
    }

    input[type="password"],
    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      min-width: 0;
      background: #0b1120;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      font-size: 0.92rem;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      color: #ecfeff;
      background: linear-gradient(140deg, #0284c7, #0ea5e9);
      padding: 10px 14px;
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(14, 165, 233, 0.32);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .chip {
      border: 1px solid rgba(14, 165, 233, 0.28);
      color: #bae6fd;
      background: var(--chip);
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .status-row {
      padding: 10px 24px;
      font-size: 0.84rem;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      min-height: 40px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-2);
      box-shadow: 0 0 0 7px rgba(34, 197, 94, 0.16);
      animation: pulse 1.8s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.7; }
    }

    .error-banner {
      margin: 14px 24px 0 24px;
      border: 1px solid rgba(239, 68, 68, 0.5);
      border-radius: 12px;
      color: #fecaca;
      background: rgba(127, 29, 29, 0.32);
      padding: 10px 12px;
      font-size: 0.86rem;
      display: none;
    }

    .table-wrap {
      overflow: auto;
      max-height: 72vh;
      margin-top: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1180px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      text-align: left;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #7dd3fc;
      background: rgba(2, 6, 23, 0.86);
      border-bottom: 1px solid var(--line);
      padding: 12px 10px;
    }

    tbody td {
      border-bottom: 1px solid rgba(148, 163, 184, 0.13);
      padding: 11px 10px;
      font-size: 0.88rem;
      vertical-align: top;
    }

    tbody tr:hover {
      background: rgba(30, 41, 59, 0.32);
    }

    .ticker {
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #f0f9ff;
    }

    .subtext {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 3px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      border: 1px solid transparent;
      min-width: 58px;
    }

    .pill-pos {
      color: #bbf7d0;
      border-color: rgba(34, 197, 94, 0.45);
      background: rgba(20, 83, 45, 0.35);
    }

    .pill-neg {
      color: #fecaca;
      border-color: rgba(239, 68, 68, 0.42);
      background: rgba(127, 29, 29, 0.35);
    }

    .pill-neu {
      color: #fde68a;
      border-color: rgba(245, 158, 11, 0.4);
      background: rgba(120, 53, 15, 0.34);
    }

    .score {
      font-weight: 800;
      font-size: 0.9rem;
      color: #dbeafe;
    }

    .muted {
      color: var(--muted);
    }

    .skeleton {
      animation: shimmer 1.3s linear infinite;
      background: linear-gradient(100deg, rgba(51, 65, 85, 0.22) 0%, rgba(100, 116, 139, 0.35) 50%, rgba(51, 65, 85, 0.22) 100%);
      background-size: 200% 100%;
      border-radius: 8px;
      height: 14px;
      width: 100%;
      display: inline-block;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 22px 12px;
      font-size: 0.9rem;
    }

    @media (max-width: 1080px) {
      .controls {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .chip, .btn {
        width: 100%;
      }
      body { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Upcoming Week Earnings Dashboard</h1>
      <p>Polygon-powered earnings calendar with probability analytics for upcoming reports.</p>
    </div>

    <div class="controls">
      <div class="input-wrap">
        <span class="control-label">Polygon API Key</span>
        <input id="apiKeyInput" type="password" placeholder="Enter key and press Enter">
      </div>
      <div id="weekRangeLabel" class="chip">Week: --</div>
      <button id="refreshBtn" class="btn" type="button">Refresh Data</button>
      <button id="toggleKeyBtn" class="btn" type="button" style="background: linear-gradient(140deg, #334155, #475569);">Show Key</button>
    </div>

    <div class="status-row">
      <span class="status-dot" aria-hidden="true"></span>
      <span id="statusText">Enter your Polygon API key to load data.</span>
    </div>

    <div id="errorBanner" class="error-banner" role="alert"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Earnings</th>
            <th>Current Price</th>
            <th>Current Change %</th>
            <th>Prob Up %</th>
            <th>Confidence</th>
            <th>Sample Size</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="resultsBody">
          <tr><td colspan="8" class="empty">No data loaded.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      const API_BASE = "https://api.polygon.io";
      const ALPHA_VANTAGE_EARNINGS_URL = "https://www.alphavantage.co/query?function=EARNINGS_CALENDAR&horizon=3month&apikey=demo";
      const STORAGE_KEY = "polygon_api_key_v3_dashboard";
      const HISTORY_TARGET = 8;
      const ANALYSIS_CONCURRENCY = 3;
      const NEWS_LIMIT = 20;
      const SKELETON_ROWS = 8;
      const GROUPED_LOOKBACK_DAYS = 14;
      const REQUEST_RETRIES = 2;
      const RETRY_BASE_MS = 750;
      const ET_ZONE = "America/New_York";

      const state = {
        apiKey: "",
        week: { start: "", end: "", label: "" },
        rows: []
      };

      const els = {
        apiKeyInput: document.getElementById("apiKeyInput"),
        toggleKeyBtn: document.getElementById("toggleKeyBtn"),
        refreshBtn: document.getElementById("refreshBtn"),
        weekRangeLabel: document.getElementById("weekRangeLabel"),
        statusText: document.getElementById("statusText"),
        errorBanner: document.getElementById("errorBanner"),
        resultsBody: document.getElementById("resultsBody")
      };

      init();

      function init() {
        state.apiKey = localStorage.getItem(STORAGE_KEY) || "";
        els.apiKeyInput.value = state.apiKey;
        state.week = getUpcomingFullWeekRangeET(new Date());
        els.weekRangeLabel.textContent = "Week: " + state.week.label;
        bindEvents();

        if (state.apiKey) {
          loadDashboard();
        }
      }

      function bindEvents() {
        els.refreshBtn.addEventListener("click", loadDashboard);
        els.toggleKeyBtn.addEventListener("click", toggleKeyVisibility);
        els.apiKeyInput.addEventListener("keydown", function (event) {
          if (event.key === "Enter") {
            saveApiKey();
            loadDashboard();
          }
        });
        els.apiKeyInput.addEventListener("blur", saveApiKey);
      }

      function toggleKeyVisibility() {
        const hidden = els.apiKeyInput.type === "password";
        els.apiKeyInput.type = hidden ? "text" : "password";
        els.toggleKeyBtn.textContent = hidden ? "Hide Key" : "Show Key";
      }

      function saveApiKey() {
        state.apiKey = (els.apiKeyInput.value || "").trim();
        if (state.apiKey) {
          localStorage.setItem(STORAGE_KEY, state.apiKey);
        } else {
          localStorage.removeItem(STORAGE_KEY);
        }
      }

      async function loadDashboard() {
        saveApiKey();
        clearError();
        state.week = getUpcomingFullWeekRangeET(new Date());
        els.weekRangeLabel.textContent = "Week: " + state.week.label;

        if (!state.apiKey) {
          setStatus("Add a Polygon API key, then press Enter or Refresh Data.");
          showError("Missing API key. Enter your Polygon key to continue.");
          return;
        }

        setLoading(true);
        renderSkeletonRows(SKELETON_ROWS);

        try {
          setStatus("Loading upcoming earnings calendar...");
          const upcoming = await fetchUpcomingWeekEarnings(state.week.start, state.week.end);
          if (!upcoming.length) {
            renderEmptyRow("No earnings found for the selected upcoming week.");
            setStatus("No earnings events found for " + state.week.label + ".");
            return;
          }

          const deduped = dedupeUpcomingEarnings(upcoming);
          const tickers = deduped.map(function (x) { return x.ticker; });
          setStatus("Fetching latest daily prices...");
          const priceMap = await fetchPriceMapForTickers(tickers);

          let rows = deduped.map(function (event) {
            const px = priceMap.get(event.ticker) || {};
            const currentPrice = safeNumber(px.currentPrice);
            const prevClose = safeNumber(px.prevClose);
            const currentChangePct = computeChangePct(currentPrice, prevClose);
            return {
              ticker: event.ticker,
              companyName: event.companyName || "N/A",
              earningsDate: event.reportDate,
              earningsTime: event.reportTime || "N/A",
              currentPrice: currentPrice,
              currentChangePct: currentChangePct,
              probUpPct: null,
              confidencePct: null,
              sampleSize: 0,
              notes: "Analyzing...",
              _sortDate: event.reportDate || "9999-12-31"
            };
          });

          rows.sort(sortRows);
          state.rows = rows;
          renderRows(state.rows);
          setStatus("Running analytics for " + rows.length + " tickers...");

          let completed = 0;
          await asyncPool(ANALYSIS_CONCURRENCY, rows, async function (row) {
            const analytics = await computeTickerAnalytics(row.ticker);
            row.probUpPct = analytics.probUpPct;
            row.confidencePct = analytics.confidencePct;
            row.sampleSize = analytics.sampleSize;
            row.notes = analytics.notes;

            completed += 1;
            setStatus("Analyzed " + completed + "/" + rows.length + " tickers...");
            state.rows.sort(sortRows);
            renderRows(state.rows);
          });

          setStatus(
            "Done: " + state.rows.length +
            " candidate tickers for " + state.week.label +
            "."
          );
        } catch (error) {
          console.error(error);
          showError(formatTopLevelError(error));
          renderEmptyRow("Unable to load data. Check API key/access and try again.");
          setStatus("Load failed.");
        } finally {
          setLoading(false);
        }
      }

      function setLoading(isLoading) {
        els.refreshBtn.disabled = isLoading;
        els.apiKeyInput.disabled = isLoading;
        if (!isLoading) {
          els.apiKeyInput.disabled = false;
        }
      }

      function setStatus(text) {
        els.statusText.textContent = text;
      }

      function showError(text) {
        els.errorBanner.style.display = "block";
        els.errorBanner.textContent = text;
      }

      function clearError() {
        els.errorBanner.style.display = "none";
        els.errorBanner.textContent = "";
      }

      function renderSkeletonRows(count) {
        const rows = [];
        for (let i = 0; i < count; i += 1) {
          rows.push(
            "<tr>" +
            "<td><span class='skeleton'></span></td>" +
            "<td><span class='skeleton'></span></td>" +
            "<td><span class='skeleton'></span></td>" +
            "<td><span class='skeleton'></span></td>" +
            "<td><span class='skeleton'></span></td>" +
            "<td><span class='skeleton'></span></td>" +
            "<td><span class='skeleton'></span></td>" +
            "<td><span class='skeleton'></span></td>" +
            "</tr>"
          );
        }
        els.resultsBody.innerHTML = rows.join("");
      }

      function renderEmptyRow(message) {
        els.resultsBody.innerHTML = "<tr><td colspan='8' class='empty'>" + escapeHtml(message) + "</td></tr>";
      }

      function renderRows(rows) {
        if (!rows.length) {
          renderEmptyRow("No rows to display.");
          return;
        }

        const visibleRows = rows.filter(function (row) {
          return passesAllFilters(row);
        });

        if (!visibleRows.length) {
          renderEmptyRow("No rows match active ranges: " + formatFilterSummary());
          return;
        }

        const html = visibleRows.map(function (row) {
          return (
            "<tr>" +
            "<td>" +
              "<div class='ticker'>" + escapeHtml(row.ticker) + "</div>" +
              "<div class='subtext'>" + escapeHtml(row.companyName || "N/A") + "</div>" +
            "</td>" +
            "<td>" +
              "<div>" + escapeHtml(formatDateDisplay(row.earningsDate)) + "</div>" +
              "<div class='subtext'>" + escapeHtml(String(row.earningsTime || "N/A").toUpperCase()) + "</div>" +
            "</td>" +
            "<td>" + fmtCurrency(row.currentPrice) + "</td>" +
            "<td>" + renderPctPill(row.currentChangePct) + "</td>" +
            "<td><span class='score'>" + fmtPct(row.probUpPct, 1) + "</span></td>" +
            "<td>" + fmtPct(row.confidencePct, 0) + "</td>" +
            "<td>" + (Number.isFinite(row.sampleSize) ? String(row.sampleSize) : "N/A") + "</td>" +
            "<td class='muted'>" + escapeHtml(row.notes || "N/A") + "</td>" +
            "</tr>"
          );
        }).join("");

        els.resultsBody.innerHTML = html;
      }

      function loadFilters() {
        const raw = localStorage.getItem(FILTER_STORAGE_KEY);
        if (!raw) return;
        try {
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return;
          state.filters = normalizeFilters({
            priceMin: parsed.priceMin,
            priceMax: parsed.priceMax,
            changeMin: parsed.changeMin,
            changeMax: parsed.changeMax,
            confidenceMin: parsed.confidenceMin,
            confidenceMax: parsed.confidenceMax
          });
        } catch (_) {
          state.filters = normalizeFilters(DEFAULT_FILTERS);
        }
      }

      function hydrateFilterInputs() {
        els.priceMinInput.value = boundToInput(state.filters.priceMin);
        els.priceMaxInput.value = boundToInput(state.filters.priceMax);
        els.changeMinInput.value = boundToInput(state.filters.changeMin);
        els.changeMaxInput.value = boundToInput(state.filters.changeMax);
        els.confidenceMinInput.value = boundToInput(state.filters.confidenceMin);
        els.confidenceMaxInput.value = boundToInput(state.filters.confidenceMax);
      }

      function applyFiltersFromInputs(shouldRender) {
        const renderNow = shouldRender !== false;
        state.filters = normalizeFilters({
          priceMin: parseInputNumberOrNull(els.priceMinInput.value),
          priceMax: parseInputNumberOrNull(els.priceMaxInput.value),
          changeMin: parseInputNumberOrNull(els.changeMinInput.value),
          changeMax: parseInputNumberOrNull(els.changeMaxInput.value),
          confidenceMin: parseInputNumberOrNull(els.confidenceMinInput.value),
          confidenceMax: parseInputNumberOrNull(els.confidenceMaxInput.value)
        });
        hydrateFilterInputs();
        localStorage.setItem(FILTER_STORAGE_KEY, JSON.stringify(state.filters));

        if (renderNow && state.rows.length) {
          renderRows(state.rows);
          setStatus("Ranges applied. Visible rows: " + countVisibleRows(state.rows) + ". " + formatFilterSummary());
        } else if (renderNow) {
          setStatus("Ranges applied. " + formatFilterSummary() + " Click Refresh Data.");
        }
      }

      function resetFilters() {
        state.filters = normalizeFilters(DEFAULT_FILTERS);
        hydrateFilterInputs();
        localStorage.setItem(FILTER_STORAGE_KEY, JSON.stringify(state.filters));
        if (state.rows.length) {
          renderRows(state.rows);
          setStatus("Ranges reset. Visible rows: " + countVisibleRows(state.rows) + ".");
        } else {
          setStatus("Ranges reset. Click Refresh Data.");
        }
      }

      function normalizeFilters(input) {
        const price = normalizeRange(input.priceMin, input.priceMax, DEFAULT_FILTERS.priceMin, DEFAULT_FILTERS.priceMax);
        const change = normalizeRange(input.changeMin, input.changeMax, DEFAULT_FILTERS.changeMin, DEFAULT_FILTERS.changeMax);
        const confidence = normalizeRange(input.confidenceMin, input.confidenceMax, DEFAULT_FILTERS.confidenceMin, DEFAULT_FILTERS.confidenceMax);
        return {
          priceMin: price.min,
          priceMax: price.max,
          changeMin: change.min,
          changeMax: change.max,
          confidenceMin: clampNullable(confidence.min, 0, 100),
          confidenceMax: clampNullable(confidence.max, 0, 100)
        };
      }

      function normalizeRange(minValue, maxValue, defaultMin, defaultMax) {
        let min = Number.isFinite(minValue) ? minValue : (Number.isFinite(defaultMin) ? defaultMin : null);
        let max = Number.isFinite(maxValue) ? maxValue : (Number.isFinite(defaultMax) ? defaultMax : null);
        if (Number.isFinite(min) && Number.isFinite(max) && min > max) {
          const temp = min;
          min = max;
          max = temp;
        }
        return { min: min, max: max };
      }

      function parseInputNumberOrNull(value) {
        if (value === null || value === undefined || String(value).trim() === "") return null;
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : null;
      }

      function getFilterInputs() {
        return [
          els.priceMinInput,
          els.priceMaxInput,
          els.changeMinInput,
          els.changeMaxInput,
          els.confidenceMinInput,
          els.confidenceMaxInput
        ];
      }

      function passesPriceAndChangeFilters(row) {
        return inRange(row.currentPrice, state.filters.priceMin, state.filters.priceMax) &&
          inRange(row.currentChangePct, state.filters.changeMin, state.filters.changeMax);
      }

      function passesAllFilters(row) {
        if (!passesPriceAndChangeFilters(row)) return false;
        if (!Number.isFinite(row.confidencePct)) {
          return !hasConfidenceBound();
        }
        if (!inRange(row.confidencePct, state.filters.confidenceMin, state.filters.confidenceMax)) {
          return false;
        }
        return true;
      }

      function countVisibleRows(rows) {
        return rows.filter(function (row) {
          return passesAllFilters(row);
        }).length;
      }

      function formatFilterSummary() {
        return "Price " + formatBoundPair(state.filters.priceMin, state.filters.priceMax, "$") +
          ", Change " + formatBoundPair(state.filters.changeMin, state.filters.changeMax, "%") +
          ", Confidence " + formatBoundPair(state.filters.confidenceMin, state.filters.confidenceMax, "%");
      }

      function hasConfidenceBound() {
        return Number.isFinite(state.filters.confidenceMin) || Number.isFinite(state.filters.confidenceMax);
      }

      function formatBoundPair(min, max, suffix) {
        const left = Number.isFinite(min) ? String(min) + suffix : "unset";
        const right = Number.isFinite(max) ? String(max) + suffix : "unset";
        return left + " to " + right;
      }

      function boundToInput(value) {
        return Number.isFinite(value) ? String(value) : "";
      }

      function sortRows(a, b) {
        if (a._sortDate < b._sortDate) return -1;
        if (a._sortDate > b._sortDate) return 1;
        const pA = Number.isFinite(a.probUpPct) ? a.probUpPct : -1;
        const pB = Number.isFinite(b.probUpPct) ? b.probUpPct : -1;
        return pB - pA;
      }

      async function fetchUpcomingWeekEarnings(startDate, endDate) {
        const candidates = [
          API_BASE + "/vX/reference/earnings?report_date.gte=" + startDate + "&report_date.lte=" + endDate + "&limit=100&sort=report_date&order=asc",
          API_BASE + "/vX/reference/earnings?from=" + startDate + "&to=" + endDate + "&limit=100&sort=report_date&order=asc",
          API_BASE + "/v3/reference/earnings?report_date.gte=" + startDate + "&report_date.lte=" + endDate + "&limit=100&sort=report_date&order=asc",
          API_BASE + "/v3/reference/earnings?from=" + startDate + "&to=" + endDate + "&limit=100&sort=report_date&order=asc",
          API_BASE + "/benzinga/v1/earnings?from=" + startDate + "&to=" + endDate
        ];

        let lastError = null;
        for (const baseUrl of candidates) {
          const attempt = await fetchPagedResults(baseUrl);
          if (!attempt.ok) {
            if (attempt.status === 404) {
              continue;
            }
            lastError = attempt.error;
            continue;
          }

          const normalized = normalizeUpcomingList(attempt.results).filter(function (item) {
            return item.reportDate >= startDate && item.reportDate <= endDate;
          });
          if (normalized.length) {
            return normalized;
          }
        }

        const fallback = await fetchAlphaVantageUpcomingEarnings(startDate, endDate);
        if (fallback.length) {
          return fallback;
        }

        if (lastError) throw lastError;
        throw new Error("Could not load earnings calendar from Polygon or fallback source.");
      }

      async function fetchPagedResults(startUrl, maxPages) {
        const pageLimit = Number.isFinite(maxPages) ? maxPages : 8;
        let url = withApiKey(startUrl);
        let page = 0;
        let merged = [];

        while (url && page < pageLimit) {
          const response = await safeFetchJson(url);
          if (!response.ok) {
            return response;
          }

          const payload = response.data || {};
          const pageResults = extractArray(payload);
          merged = merged.concat(pageResults);

          const next = payload.next_url ? withApiKey(payload.next_url) : null;
          if (!next || next === url) break;
          url = next;
          page += 1;
        }

        return { ok: true, status: 200, data: { results: merged }, results: merged };
      }

      function normalizeUpcomingList(rawList) {
        const out = [];
        for (const raw of rawList) {
          const record = normalizeEarningsRecord(raw);
          if (record.ticker && record.reportDate) out.push(record);
        }
        return out;
      }

      function dedupeUpcomingEarnings(list) {
        const map = new Map();
        for (const item of list) {
          if (!item.ticker) continue;
          const current = map.get(item.ticker);
          if (!current || item.reportDate < current.reportDate) {
            map.set(item.ticker, item);
          }
        }
        return Array.from(map.values());
      }

      async function fetchPriceMapForTickers(tickers) {
        const out = new Map();
        if (!tickers.length) return out;

        const sessions = await fetchRecentGroupedSessions(2, GROUPED_LOOKBACK_DAYS);
        if (sessions.length < 2) {
          throw new Error("Unable to resolve two recent market sessions for price changes.");
        }

        const current = sessions[0].map;
        const previous = sessions[1].map;

        for (const ticker of tickers) {
          const currentBar = current.get(ticker);
          const prevBar = previous.get(ticker);
          let currentPrice = safeNumber(currentBar && currentBar.c);
          let prevClose = safeNumber(prevBar && prevBar.c);

          if (!Number.isFinite(currentPrice) && Number.isFinite(prevClose)) {
            currentPrice = prevClose;
          }
          if (!Number.isFinite(prevClose) && Number.isFinite(currentPrice)) {
            prevClose = currentPrice;
          }

          out.set(ticker, {
            currentPrice: currentPrice,
            prevClose: prevClose,
            currentSession: sessions[0].date,
            previousSession: sessions[1].date
          });
        }
        return out;
      }

      async function fetchRecentGroupedSessions(requiredCount, lookbackDays) {
        const sessions = [];
        const maxDays = Number.isFinite(lookbackDays) ? lookbackDays : 10;
        const todayET = toDateInTimeZone(new Date(), ET_ZONE);
        todayET.setHours(0, 0, 0, 0);

        for (let i = 0; i < maxDays && sessions.length < requiredCount; i += 1) {
          const day = addDays(todayET, -i);
          const dow = day.getDay();
          if (dow === 0 || dow === 6) continue;
          const iso = formatDateISO(day);
          const grouped = await fetchGroupedDailyForDate(iso);
          if (grouped && grouped.map.size) {
            sessions.push(grouped);
          }
        }

        return sessions;
      }

      async function fetchGroupedDailyForDate(dateIso) {
        const endpoint = API_BASE + "/v2/aggs/grouped/locale/us/market/stocks/" + dateIso + "?adjusted=true";
        const res = await safeFetchJson(withApiKey(endpoint));
        if (!res.ok) {
          if (res.status === 401 || res.status === 403 || res.status === 429) {
            throw res.error || new Error("Grouped daily endpoint unavailable.");
          }
          return null;
        }

        const results = (res.data && res.data.results) || [];
        if (!results.length) return null;

        const map = new Map();
        for (const row of results) {
          const ticker = row.T || row.ticker;
          if (!ticker) continue;
          map.set(ticker, { c: safeNumber(row.c), o: safeNumber(row.o) });
        }

        return { date: dateIso, map: map };
      }

      async function fetchAlphaVantageUpcomingEarnings(startDate, endDate) {
        let response;
        try {
          response = await fetch(ALPHA_VANTAGE_EARNINGS_URL, {
            method: "GET",
            headers: { "Accept": "text/csv, text/plain, application/json" }
          });
        } catch (error) {
          return [];
        }

        if (!response.ok) return [];
        const text = await response.text();
        if (!text || !text.trim()) return [];
        if (text.trim().charAt(0) === "{") return [];

        const rows = parseCsvRecords(text);
        const out = [];
        for (const row of rows) {
          const reportDate = String(row.reportDate || "").slice(0, 10);
          if (!reportDate || reportDate < startDate || reportDate > endDate) continue;
          const ticker = String(row.symbol || "").trim().toUpperCase();
          if (!ticker) continue;
          out.push({
            ticker: ticker,
            companyName: String(row.name || "").trim(),
            reportDate: reportDate,
            reportTime: normalizeSession(row.timeOfTheDay),
            actualEPS: null,
            estimateEPS: safeNumber(row.estimate)
          });
        }

        return out;
      }

      async function computeTickerAnalytics(ticker) {
        const notes = [];
        try {
          const [history, candles, sentiment] = await Promise.all([
            fetchHistoricalEarnings(ticker),
            fetchDailyCandles(ticker, 3),
            fetchSentimentScore(ticker)
          ]);

          const postStats = computePostEarningsStats(history, candles, HISTORY_TARGET);
          const surprise = computeSurpriseScore(history);
          const technical = computeTechnicalScore(candles);
          if (sentiment === null) notes.push("Sentiment unavailable");
          if (postStats.sampleSize < 3) notes.push("Low sample");

          const composite = computeCompositeProbability({
            historical: postStats.historicalScore,
            surprise: surprise.score,
            technical: technical.score,
            sentiment: sentiment
          });

          const confidence = computeConfidence({
            sampleSize: postStats.sampleSize,
            std1d: postStats.std1d,
            componentCount: composite.componentCount
          });

          if (!Number.isFinite(composite.probabilityPct)) {
            notes.push("Insufficient historical data");
          }

          const gain10Text = formatTenDollarNote(postStats.probGain10Pct);
          const extraNotes = notes.length ? " | " + notes.join("; ") : "";
          const noteText = gain10Text + extraNotes;

          return {
            probUpPct: composite.probabilityPct,
            confidencePct: confidence,
            sampleSize: postStats.sampleSize,
            notes: noteText
          };
        } catch (error) {
          return {
            probUpPct: null,
            confidencePct: null,
            sampleSize: 0,
            notes: "Analysis error: " + shortError(error)
          };
        }
      }

      async function fetchHistoricalEarnings(ticker) {
        const candidates = [
          API_BASE + "/vX/reference/financials?ticker=" + encodeURIComponent(ticker) + "&timeframe=quarterly&limit=50&sort=filing_date&order=desc"
        ];

        for (const url of candidates) {
          const res = await fetchPagedResults(url, 3);
          if (!res.ok) {
            if (res.status === 404) continue;
            if (res.status === 403 || res.status === 401) throw res.error;
            continue;
          }
          const normalized = normalizeUpcomingList(res.results || []);
          if (normalized.length) {
            const todayET = formatDateISO(toDateInTimeZone(new Date(), ET_ZONE));
            return normalized.filter(function (x) {
              return x.reportDate < todayET;
            });
          }
        }

        return [];
      }

      async function fetchDailyCandles(ticker, yearsBack) {
        const end = new Date();
        const start = new Date();
        start.setFullYear(end.getFullYear() - (Number.isFinite(yearsBack) ? yearsBack : 3));

        const fromDate = formatDateISO(start);
        const toDate = formatDateISO(end);
        const path =
          API_BASE +
          "/v2/aggs/ticker/" +
          encodeURIComponent(ticker) +
          "/range/1/day/" +
          fromDate +
          "/" +
          toDate +
          "?adjusted=true&sort=asc&limit=5000";

        const res = await safeFetchJson(withApiKey(path));
        if (!res.ok) throw res.error || new Error("Candles fetch failed");
        const results = (res.data && res.data.results) || [];
        return results.map(function (x) {
          return {
            ts: x.t,
            date: formatDateISO(new Date(x.t)),
            c: safeNumber(x.c),
            o: safeNumber(x.o)
          };
        }).filter(function (x) {
          return Number.isFinite(x.c);
        });
      }

      async function fetchSentimentScore(ticker) {
        const endpoint =
          API_BASE +
          "/v2/reference/news?ticker=" +
          encodeURIComponent(ticker) +
          "&limit=" + NEWS_LIMIT +
          "&order=desc&sort=published_utc";

        const res = await safeFetchJson(withApiKey(endpoint));
        if (!res.ok) {
          return null;
        }

        const articles = (res.data && res.data.results) || [];
        if (!articles.length) return null;

        const positiveWords = ["beat", "growth", "strong", "upside", "guidance raised", "bullish", "record", "expansion", "outperform"];
        const negativeWords = ["miss", "weak", "downgrade", "cut guidance", "bearish", "slump", "lawsuit", "headwind", "decline"];

        let score = 0;
        let matches = 0;

        for (const article of articles) {
          const text = String((article.title || "") + " " + (article.description || "")).toLowerCase();
          for (const word of positiveWords) {
            if (text.indexOf(word) >= 0) {
              score += 1;
              matches += 1;
            }
          }
          for (const word of negativeWords) {
            if (text.indexOf(word) >= 0) {
              score -= 1;
              matches += 1;
            }
          }
        }

        if (!matches) return null;
        const normalized = clamp(score / Math.max(matches, 1), -1, 1);
        return (normalized + 1) / 2;
      }

      function computePostEarningsStats(events, candles, targetN) {
        const windows = [1, 5, 10];
        const values = { 1: [], 5: [], 10: [] };
        const oneDayReturns = [];
        let positive1d = 0;
        let gain10Count = 0;
        let used = 0;

        if (!events.length || !candles.length) {
          return {
            sampleSize: 0,
            std1d: null,
            historicalScore: null,
            probGain10Pct: null
          };
        }

        const sortedEvents = events
          .filter(function (e) { return Boolean(e.reportDate); })
          .sort(function (a, b) { return a.reportDate > b.reportDate ? -1 : 1; });

        for (const event of sortedEvents) {
          if (used >= targetN) break;
          const metrics = computeEventForwardReturns(event, candles, windows);
          if (!metrics) continue;

          if (Number.isFinite(metrics[1])) {
            oneDayReturns.push(metrics[1]);
            if (metrics[1] > 0) positive1d += 1;
            if (metrics[1] >= 0.10) gain10Count += 1;
            used += 1;
          }

          for (const w of windows) {
            if (Number.isFinite(metrics[w])) values[w].push(metrics[w]);
          }
        }

        const avg1 = mean(values[1]);
        const avg5 = mean(values[5]);
        const avg10 = mean(values[10]);
        const std1d = stddev(oneDayReturns);
        const hitRate = oneDayReturns.length ? positive1d / oneDayReturns.length : null;
        const probGain10Pct = oneDayReturns.length ? (gain10Count / oneDayReturns.length) * 100 : null;
        const magScore = Number.isFinite(avg1) ? clamp((avg1 / 0.08 + 1) / 2, 0, 1) : null;
        const consistency = Number.isFinite(std1d) ? clamp(1 - (std1d / 0.12), 0, 1) : null;

        let historicalScore = null;
        if (hitRate !== null && magScore !== null) {
          historicalScore = clamp((0.72 * hitRate) + (0.2 * magScore) + (0.08 * (consistency === null ? 0.5 : consistency)), 0, 1);
        }

        return {
          sampleSize: oneDayReturns.length,
          std1d: Number.isFinite(std1d) ? std1d : null,
          historicalScore: historicalScore,
          probGain10Pct: probGain10Pct
        };
      }

      function computeEventForwardReturns(event, candles, windows) {
        const result = {};
        const eventDate = event.reportDate;
        const session = normalizeSession(event.reportTime || "");
        const firstIdx = candles.findIndex(function (c) { return c.date >= eventDate; });
        if (firstIdx < 0) return null;

        const reactionIdx = session === "amc" ? firstIdx + 1 : firstIdx;
        const baseIdx = reactionIdx - 1;
        if (baseIdx < 0 || reactionIdx >= candles.length) return null;

        const baseClose = candles[baseIdx].c;
        if (!Number.isFinite(baseClose) || baseClose <= 0) return null;

        for (const w of windows) {
          const targetIdx = reactionIdx + (w - 1);
          if (targetIdx >= candles.length) {
            result[w] = null;
            continue;
          }
          const targetClose = candles[targetIdx].c;
          if (!Number.isFinite(targetClose)) {
            result[w] = null;
            continue;
          }
          result[w] = (targetClose / baseClose) - 1;
        }

        return result;
      }

      function computeSurpriseScore(events) {
        const valid = events.filter(function (e) {
          return Number.isFinite(e.actualEPS) && Number.isFinite(e.estimateEPS);
        });
        if (!valid.length) {
          return { score: null, beatRate: null };
        }
        const beats = valid.filter(function (e) {
          return e.actualEPS > e.estimateEPS;
        }).length;
        return {
          score: beats / valid.length,
          beatRate: beats / valid.length
        };
      }

      function computeTechnicalScore(candles) {
        if (!candles.length || candles.length < 70) {
          return { score: null };
        }

        const closes = candles.map(function (x) { return x.c; });
        const sma20 = mean(closes.slice(-20));
        const sma60 = mean(closes.slice(-60));
        const trendScore = Number.isFinite(sma20) && Number.isFinite(sma60) && sma60 !== 0
          ? clamp((sma20 / sma60 - 1) * 6 + 0.5, 0, 1)
          : 0.5;

        const recent20 = closes.slice(-21);
        const returns = [];
        for (let i = 1; i < recent20.length; i += 1) {
          const prev = recent20[i - 1];
          const curr = recent20[i];
          if (Number.isFinite(prev) && prev !== 0 && Number.isFinite(curr)) {
            returns.push((curr / prev) - 1);
          }
        }
        const vol = stddev(returns);
        const volScore = Number.isFinite(vol) ? clamp(1 - (vol / 0.05), 0, 1) : 0.5;

        const momentum20 = closes[closes.length - 1] / closes[closes.length - 21] - 1;
        const momentumScore = Number.isFinite(momentum20) ? clamp(momentum20 * 4 + 0.5, 0, 1) : 0.5;

        return { score: clamp((0.45 * trendScore) + (0.3 * momentumScore) + (0.25 * volScore), 0, 1) };
      }

      function computeCompositeProbability(parts) {
        const weights = {
          historical: 0.4,
          surprise: 0.25,
          technical: 0.2,
          sentiment: 0.15
        };
        const active = [];
        for (const key of Object.keys(weights)) {
          if (Number.isFinite(parts[key])) {
            active.push(key);
          }
        }
        if (!active.length) {
          return { probabilityPct: null, componentCount: 0 };
        }

        const totalWeight = active.reduce(function (sum, key) { return sum + weights[key]; }, 0);
        let score = 0;
        for (const key of active) {
          const normWeight = weights[key] / totalWeight;
          score += parts[key] * normWeight;
        }

        return {
          probabilityPct: clamp(score * 100, 0, 100),
          componentCount: active.length
        };
      }

      function computeConfidence(args) {
        const sample = Number.isFinite(args.sampleSize) ? clamp(args.sampleSize / HISTORY_TARGET, 0, 1) : 0;
        const stability = Number.isFinite(args.std1d) ? clamp(1 - (args.std1d / 0.15), 0, 1) : 0.2;
        const components = Number.isFinite(args.componentCount) ? clamp(args.componentCount / 4, 0, 1) : 0.25;
        return clamp((0.52 * sample + 0.34 * stability + 0.14 * components) * 100, 0, 100);
      }

      function normalizeEarningsRecord(raw) {
        const ticker = raw.ticker || raw.symbol || raw.T || raw.stock || "";
        const reportDate =
          raw.report_date ||
          raw.reportDate ||
          raw.date ||
          raw.calendar_date ||
          raw.filing_date ||
          raw.fiscal_date ||
          "";

        const reportTimeRaw =
          raw.time_of_day ||
          raw.time ||
          raw.session ||
          raw.when ||
          raw.market_session ||
          "";

        const actualEPS = safeNumber(
          raw.actual_eps,
          raw.actualEPS,
          raw.eps_actual,
          raw.eps_reported,
          raw.eps && raw.eps.actual,
          raw.financials && raw.financials.income_statement && raw.financials.income_statement.basic_earnings_per_share && raw.financials.income_statement.basic_earnings_per_share.value
        );

        const estimateEPS = safeNumber(
          raw.consensus_eps,
          raw.estimated_eps,
          raw.estimateEPS,
          raw.eps_estimate,
          raw.eps && raw.eps.estimate
        );

        return {
          ticker: String(ticker || "").toUpperCase(),
          companyName: raw.company_name || raw.name || raw.company || "",
          reportDate: String(reportDate || "").slice(0, 10),
          reportTime: normalizeSession(reportTimeRaw),
          actualEPS: actualEPS,
          estimateEPS: estimateEPS
        };
      }

      async function safeFetchJson(url, options) {
        const maxRetries = Number.isFinite(options && options.retries) ? options.retries : REQUEST_RETRIES;
        const retryBaseMs = Number.isFinite(options && options.retryMs) ? options.retryMs : RETRY_BASE_MS;

        for (let attempt = 0; attempt <= maxRetries; attempt += 1) {
          try {
            const response = await fetch(url, { method: "GET", headers: { "Accept": "application/json" } });
            let payload = null;
            try {
              payload = await response.json();
            } catch (_) {
              payload = null;
            }

            if (!response.ok) {
              if ((response.status === 429 || response.status >= 500) && attempt < maxRetries) {
                await sleep(retryBaseMs * (attempt + 1));
                continue;
              }

              const msg = extractErrorMessage(payload, response.status);
              return {
                ok: false,
                status: response.status,
                data: payload,
                error: new Error(msg)
              };
            }

            return { ok: true, status: response.status, data: payload };
          } catch (error) {
            if (attempt < maxRetries) {
              await sleep(retryBaseMs * (attempt + 1));
              continue;
            }
            return { ok: false, status: 0, data: null, error: error };
          }
        }

        return { ok: false, status: 0, data: null, error: new Error("Request failed.") };
      }

      function extractErrorMessage(payload, status) {
        const base = payload && (payload.error || payload.message || payload.status || payload.detail);
        if (status === 401 || status === 403) {
          return "Authentication failed. Verify your Polygon API key and plan access.";
        }
        if (status === 429) {
          return "Rate limit reached. Slow refresh frequency or reduce ticker universe.";
        }
        if (status === 404) {
          return "Endpoint not available for this Polygon plan/version.";
        }
        return base ? String(base) : "Polygon API request failed with status " + status + ".";
      }

      function formatTopLevelError(error) {
        const message = String(error && error.message ? error.message : error);
        if (message.toLowerCase().indexOf("auth") >= 0 || message.toLowerCase().indexOf("key") >= 0) {
          return "Authentication issue: verify Polygon API key and endpoint access.";
        }
        if (message.toLowerCase().indexOf("rate") >= 0 || message.indexOf("429") >= 0) {
          return "Rate limit hit: try again in a minute or process fewer tickers.";
        }
        return "Load failed: " + message;
      }

      function shortError(error) {
        const text = String(error && error.message ? error.message : error);
        if (text.length > 80) return text.slice(0, 77) + "...";
        return text;
      }

      function getUpcomingFullWeekRangeET(referenceDate) {
        const etDate = toDateInTimeZone(referenceDate, ET_ZONE);
        const day = etDate.getDay();
        const daysUntilNextMonday = day === 1 ? 7 : ((8 - day) % 7);
        const monday = addDays(etDate, daysUntilNextMonday);
        monday.setHours(0, 0, 0, 0);
        const friday = addDays(monday, 4);

        const start = formatDateISO(monday);
        const end = formatDateISO(friday);
        const pretty = formatLongDate(monday) + " - " + formatLongDate(friday);
        return { start: start, end: end, label: pretty };
      }

      function toDateInTimeZone(date, timeZone) {
        const parts = new Intl.DateTimeFormat("en-US", {
          timeZone: timeZone,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false
        }).formatToParts(date);

        const map = {};
        for (const part of parts) {
          if (part.type !== "literal") {
            map[part.type] = part.value;
          }
        }

        const localLike = map.year + "-" + map.month + "-" + map.day + "T" + map.hour + ":" + map.minute + ":" + map.second;
        return new Date(localLike);
      }

      function formatLongDate(date) {
        return new Intl.DateTimeFormat("en-US", {
          timeZone: ET_ZONE,
          month: "short",
          day: "numeric",
          year: "numeric"
        }).format(date);
      }

      function addDays(date, days) {
        const next = new Date(date.getTime());
        next.setDate(next.getDate() + days);
        return next;
      }

      function normalizeSession(value) {
        const text = String(value || "").toLowerCase();
        if (!text) return "tbd";
        if (text.indexOf("after") >= 0 || text.indexOf("close") >= 0 || text.indexOf("pm") >= 0 || text === "amc") return "amc";
        if (text.indexOf("before") >= 0 || text.indexOf("open") >= 0 || text.indexOf("am") >= 0 || text === "bmo") return "bmo";
        if (text.indexOf("during") >= 0 || text.indexOf("market") >= 0) return "dmt";
        if (text === "amc" || text === "bmo" || text === "dmt") return text;
        return "tbd";
      }

      function withApiKey(url) {
        if (url.indexOf("apiKey=") >= 0) return url;
        const joiner = url.indexOf("?") >= 0 ? "&" : "?";
        return url + joiner + "apiKey=" + encodeURIComponent(state.apiKey);
      }

      function extractArray(payload) {
        if (!payload) return [];
        if (Array.isArray(payload.results)) return payload.results;
        if (Array.isArray(payload.data)) return payload.data;
        if (Array.isArray(payload.tickers)) return payload.tickers;
        return [];
      }

      function parseCsvRecords(csvText) {
        const lines = String(csvText || "")
          .split(/\r?\n/)
          .filter(function (line) {
            return line && line.trim().length > 0;
          });

        if (!lines.length) return [];
        const headers = parseCsvLine(lines[0]).map(function (h) {
          return String(h || "").replace(/^\uFEFF/, "").trim();
        });

        const out = [];
        for (let i = 1; i < lines.length; i += 1) {
          const cols = parseCsvLine(lines[i]);
          if (!cols.length) continue;
          const record = {};
          for (let c = 0; c < headers.length; c += 1) {
            if (!headers[c]) continue;
            record[headers[c]] = cols[c] !== undefined ? cols[c] : "";
          }
          out.push(record);
        }
        return out;
      }

      function parseCsvLine(line) {
        const out = [];
        let cur = "";
        let inQuotes = false;
        const text = String(line || "");

        for (let i = 0; i < text.length; i += 1) {
          const ch = text[i];
          if (ch === "\"") {
            if (inQuotes && text[i + 1] === "\"") {
              cur += "\"";
              i += 1;
            } else {
              inQuotes = !inQuotes;
            }
            continue;
          }
          if (ch === "," && !inQuotes) {
            out.push(cur);
            cur = "";
            continue;
          }
          cur += ch;
        }
        out.push(cur);
        return out;
      }

      function mean(arr) {
        if (!arr || !arr.length) return null;
        let sum = 0;
        let count = 0;
        for (const n of arr) {
          if (Number.isFinite(n)) {
            sum += n;
            count += 1;
          }
        }
        if (!count) return null;
        return sum / count;
      }

      function sleep(ms) {
        return new Promise(function (resolve) {
          setTimeout(resolve, ms);
        });
      }

      function stddev(arr) {
        if (!arr || arr.length < 2) return null;
        const avg = mean(arr);
        if (!Number.isFinite(avg)) return null;
        let total = 0;
        let count = 0;
        for (const n of arr) {
          if (Number.isFinite(n)) {
            total += (n - avg) * (n - avg);
            count += 1;
          }
        }
        if (count < 2) return null;
        return Math.sqrt(total / (count - 1));
      }

      function chunkArray(arr, size) {
        const out = [];
        for (let i = 0; i < arr.length; i += size) {
          out.push(arr.slice(i, i + size));
        }
        return out;
      }

      async function asyncPool(limit, array, iteratorFn) {
        const ret = [];
        const executing = [];
        for (const item of array) {
          const p = Promise.resolve().then(function () {
            return iteratorFn(item);
          });
          ret.push(p);
          if (limit <= array.length) {
            const e = p.then(function () {
              const idx = executing.indexOf(e);
              if (idx >= 0) executing.splice(idx, 1);
            });
            executing.push(e);
            if (executing.length >= limit) {
              await Promise.race(executing);
            }
          }
        }
        return Promise.all(ret);
      }

      function computeChangePct(current, prevClose) {
        if (!Number.isFinite(current) || !Number.isFinite(prevClose) || prevClose === 0) return null;
        return ((current - prevClose) / prevClose) * 100;
      }

      function inRange(value, min, max) {
        if (!Number.isFinite(value)) return false;
        if (Number.isFinite(min) && value < min) return false;
        if (Number.isFinite(max) && value > max) return false;
        return true;
      }

      function safeNumber() {
        for (let i = 0; i < arguments.length; i += 1) {
          const value = Number(arguments[i]);
          if (Number.isFinite(value)) return value;
        }
        return null;
      }

      function clamp(value, min, max) {
        if (!Number.isFinite(value)) return min;
        return Math.max(min, Math.min(max, value));
      }

      function clampNullable(value, min, max) {
        if (!Number.isFinite(value)) return null;
        return clamp(value, min, max);
      }

      function fmtCurrency(value) {
        if (!Number.isFinite(value)) return "N/A";
        return "$" + value.toFixed(2);
      }

      function fmtPct(value, digits) {
        if (!Number.isFinite(value)) return "N/A";
        const d = Number.isFinite(digits) ? digits : 2;
        return value.toFixed(d) + "%";
      }

      function renderPctPill(value) {
        if (!Number.isFinite(value)) return "<span class='pill pill-neu'>N/A</span>";
        const cls = value > 0.05 ? "pill pill-pos" : (value < -0.05 ? "pill pill-neg" : "pill pill-neu");
        const sign = value > 0 ? "+" : "";
        return "<span class='" + cls + "'>" + sign + value.toFixed(2) + "%</span>";
      }

      function formatTenDollarNote(probPct) {
        if (!Number.isFinite(probPct)) return "P($100->$110 in 1D): N/A (not possible)";
        const verdict = probPct >= 50 ? "possible" : "not possible";
        return "P($100->$110 in 1D): " + probPct.toFixed(1) + "% (" + verdict + ")";
      }

      function formatDateISO(date) {
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, "0");
        const dd = String(date.getDate()).padStart(2, "0");
        return yyyy + "-" + mm + "-" + dd;
      }

      function formatDateDisplay(yyyyMmDd) {
        if (!yyyyMmDd) return "N/A";
        const date = new Date(yyyyMmDd + "T00:00:00");
        if (Number.isNaN(date.getTime())) return yyyyMmDd;
        return new Intl.DateTimeFormat("en-US", {
          timeZone: ET_ZONE,
          month: "short",
          day: "numeric",
          year: "numeric"
        }).format(date);
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
    })();
  </script>
